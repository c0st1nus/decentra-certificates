services:
  postgres:
    image: postgres:16-alpine
    container_name: decentra-certificates-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: decentra_certificates
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d decentra_certificates"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - decentra

  redis:
    image: redis:7-alpine
    container_name: decentra-certificates-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - decentra

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    container_name: decentra-certificates-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - decentra

  minio-init:
    image: minio/mc:RELEASE.2025-02-21T16-00-46Z
    container_name: decentra-certificates-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 1; done &&
      mc mb -p local/decentra-certificates || true &&
      mc anonymous set private local/decentra-certificates || true
      "
    restart: "no"
    networks:
      - decentra

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: decentra-certificates-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/decentra_certificates
      REDIS_URL: redis://redis:6379/0
      STORAGE_S3_ENDPOINT_URL: http://minio:9000
      BIND_ADDRESS: "0.0.0.0:8080"
    ports:
      - "8080:8080"
    volumes:
      - uploads_data:/app/uploads
    networks:
      - decentra

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: decentra-certificates-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
    ports:
      - "3000:3000"
    networks:
      - decentra

volumes:
  postgres_data:
  redis_data:
  minio_data:
  uploads_data:

networks:
  decentra:
    driver: bridge
