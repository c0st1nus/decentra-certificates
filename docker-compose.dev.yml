services:
  postgres:
    image: postgres:16-alpine
    container_name: decentra-certificates-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: decentra_certificates
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d decentra_certificates"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - decentra

  redis:
    image: redis:7-alpine
    container_name: decentra-certificates-redis
    restart: unless-stopped
    ports:
      - "16379:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - decentra

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    container_name: decentra-certificates-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "19000:9000"
      - "19001:9001"
    volumes:
      - minio_data:/data
    networks:
      - decentra

  minio-init:
    image: minio/mc:RELEASE.2025-02-21T16-00-46Z
    container_name: decentra-certificates-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 1; done &&
      mc mb -p local/decentra-certificates || true &&
      mc anonymous set private local/decentra-certificates || true
      "
    restart: "no"
    networks:
      - decentra

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  decentra:
    driver: bridge
